<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Expense – Expense Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="edit-page">

<div class="edit-container">
    <div class="edit-card">

        <div class="edit-header">
            <div class="edit-icon">✏️</div>
            <div>
                <h2>Edit Expense</h2>
                <p>Update your expense details</p>
            </div>
        </div>

        <form method="POST" action="/edit/{{ expense['id'] }}">
            <div class="field">
                <label>Amount (₹)</label>
                <input type="number" name="amount"
                       value="{{ expense['amount'] }}"
                       min="1" step="0.01" required>
            </div>
            <div class="field">
                <label>Category</label>
                <select name="category">
                    <option value="Food"
                        {% if expense['category'] == 'Food' %}selected{% endif %}>
                        🍔 Food
                    </option>
                    <option value="Travel"
                        {% if expense['category'] == 'Travel' %}selected{% endif %}>
                        ✈️ Travel
                    </option>
                    <option value="Bills"
                        {% if expense['category'] == 'Bills' %}selected{% endif %}>
                        📄 Bills
                    </option>
                    <option value="Shopping"
                        {% if expense['category'] == 'Shopping' %}selected{% endif %}>
                        🛍️ Shopping
                    </option>
                    <option value="Health"
                        {% if expense['category'] == 'Health' %}selected{% endif %}>
                        💊 Health
                    </option>
                    <option value="Other"
                        {% if expense['category'] == 'Other' %}selected{% endif %}>
                        📦 Other
                    </option>
                </select>
            </div>
            <div class="field">
                <label>Note (optional)</label>
                <input type="text" name="note"
                       value="{{ expense['note'] or '' }}"
                       placeholder="e.g. Lunch with friends">
            </div>
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="/dashboard" class="btn btn-ghost">Cancel</a>
        </form>

    </div>
</div>

</body>
</html>
