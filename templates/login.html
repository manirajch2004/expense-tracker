<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Expense Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="auth-logo-icon">💰</div>
            <h1>Expense Tracker</h1>
            <p>Manage your finances smartly</p>
        </div>

        <h2>Welcome back</h2>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="field">
                <label>Email Address</label>
                <input type="email" name="email"
                       value="{{ request.args.get('email', '') }}"
                       placeholder="you@example.com" required>
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" name="password"
                       placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="margin-top:8px;">Sign In</button>
        </form>

        <p class="link-row">Don't have an account? <a href="/signup">Create one</a></p>
    </div>
</div>

</body>
</html>
