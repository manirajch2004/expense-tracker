<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up – Expense Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">

<div class="auth-container">
    <div class="brand">
        <div class="brand-icon">💰</div>
        <h1>Expense Tracker</h1>
        <p>Start tracking in seconds</p>
    </div>

    <div class="card">
        <h2>Create account</h2>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/signup">
            <div class="field">
                <label>Full name</label>
                <input type="text" name="name" placeholder="Your name" required>
            </div>
            <div class="field">
                <label>Email</label>
                <input type="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" name="password" placeholder="Min 6 characters" minlength="6" required>
            </div>
            <button type="submit" class="btn btn-primary">Create account</button>
        </form>

        <p class="link-row">Already have one? <a href="/login">Sign in</a></p>
    </div>
</div>

</body>
</html>
